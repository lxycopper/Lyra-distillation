train_config: ""
experiment: "lyra2"
config_file: "lyra_2/_src/configs/config.py"

# Set this to your Lyra-2 teacher checkpoint path.
teacher_ckpt: "/apdcephfs_qy3/share_1565115/xuanyiliu/pretrained_weights/Lyra-2.0/checkpoints/model"
student_ckpt: ""
critic_ckpt: ""
output_dir: "outputs/distill_sf_dmd_sample8"

# Hydra overrides for dataloader paths.
# Use '+' so Hydra adds keys under the LazyCall `dataset` node (struct forbids unknown keys otherwise).
experiment_opt:
  - "+dataloader_train.dataloaders.dl3dv_long_moge_chunk_81_480p_dav3_hsg.dataloader.dataset.dataset_cfg.params.root_path=/apdcephfs/share_1565115/apdcephfs_qy3/share_1565115/xuanyiliu/stream/lyra/Lyra-2/lyra_2/_src/train/lyra_samples/DL3DV-ALL-480P-lyra-sample8"
  - "+dataloader_train.dataloaders.dl3dv_long_moge_chunk_81_480p_dav3_hsg.dataloader.dataset.dataset_cfg.params.filter_list_path="
  - "+dataloader_train.dataloaders.dl3dv_long_moge_chunk_81_480p_dav3_hsg.dataloader.dataset.t5_embedding_path=/apdcephfs/share_1565115/apdcephfs_qy3/share_1565115/xuanyiliu/stream/lyra/Lyra-2/lyra_2/_src/train/lyra_samples/DL3DV-ALL-480P-lyra-sample8/t5_embeddings"

# Training schedule.
max_steps: 3000
log_every: 10
save_every: 200
seed: 42

# Optimizer.
lr_g: 1.0e-5
lr_d: 1.0e-5
weight_decay: 0.0
grad_clip_g: 1.0
grad_clip_d: 1.0
train_lora_only: true

# Self-Forcing style alternating update.
generator_update_every: 2
dmd_weight: 1.0
critic_weight: 1.0
normalizer_eps: 1.0e-6

# Self-augmentation switches.
teacher_self_aug: false
student_self_aug: true
critic_self_aug: false
